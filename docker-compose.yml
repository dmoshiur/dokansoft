version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lovely_erp_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-lovely_erp}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deployment/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:alpine
    container_name: lovely_erp_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-lovelyredis123}

  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: lovely_erp_api
    restart: always
    depends_on:
      - db
      - redis
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-lovely_erp}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-lovelyredis123}
      - JWT_SECRET=${JWT_SECRET:-super_secure_jwt_key_2026}
    ports:
      - "4000:4000"

  frontend:
    build: 
      context: .
      dockerfile: Dockerfile.client
    container_name: lovely_erp_frontend
    restart: always
    ports:
      - "80:80"

volumes:
  pgdata:
  redisdata:
